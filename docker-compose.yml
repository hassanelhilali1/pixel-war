# docker compose pour dev en local
# lancer avec : docker compose up --build
# le front est sur localhost et le back sur localhost:3000

services:

  # la base de données
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     pixelwar
      POSTGRES_PASSWORD: pixelwar
      POSTGRES_DB:       pixelwar
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U pixelwar"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - pixel-war-net

  # le backend node
  backend:
    build:
      context: ./app/backend
      target:  production
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pixelwar:pixelwar@postgres:5432/pixelwar
      PORT:         "3000"
      GRID_SIZE:    "50"
      LOG_LEVEL:    info
      FRONTEND_URL: "http://localhost"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pixel-war-net

  # le frontend react
  frontend:
    build:
      context: ./app/frontend
      target:  production
      args:
        VITE_GRID_SIZE: "50"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pixel-war-net

volumes:
  pgdata:
    driver: local

networks:
  pixel-war-net:
    driver: bridge
