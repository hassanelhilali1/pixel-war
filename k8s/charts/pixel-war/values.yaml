# ── Paramètres globaux ────────────────────────────────────────────────────────
global:
  imageRegistry: ghcr.io
  imagePullSecrets: []

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: pixel-war-frontend
    tag:        "latest"
    pullPolicy: Never   # image locale Minikube, pas de pull depuis registry

  replicaCount: 2

  resources:
    requests:
      cpu:    50m
      memory: 64Mi
    limits:
      cpu:    200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 80

  env:
    VITE_GRID_SIZE: "50"

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  image:
    repository: pixel-war-backend
    tag:        "latest"
    pullPolicy: Never   # image locale Minikube, pas de pull depuis registry

  replicaCount: 2

  resources:
    requests:
      cpu:    100m
      memory: 128Mi
    limits:
      cpu:    500m
      memory: 512Mi

  service:
    type: ClusterIP
    port: 3000

  # Clés dans les ressources créées par Terraform
  secretName:    db-credentials
  configMapName: app-config

  hpa:
    enabled:     true
    minReplicas: 2
    maxReplicas: 5
    cpuTarget:   70

  pdb:
    enabled:      true
    minAvailable: 1

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled:          true
  ingressClassName: nginx
  host:             pixel-war.local
  # Pour accès depuis d'autres PC sans modifier /etc/hosts :
  # mettre useHostHeader: false expose l'app sur toute requête quelle que soit l'URL
  useHostHeader:    true
  tls:              false
  tlsSecretName:    pixel-war-tls

# ── Network Policies ──────────────────────────────────────────────────────────
networkPolicy:
  enabled: true


