{{- if .Values.networkPolicy.enabled }}
# le backend peut recevoir du trafic du frontend et de l'ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-ingress-policy
  labels:
    {{- include "pixel-war.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pixel-war.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # frontend -> backend
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
      ports:
        - port: 3000
    # ingress controller -> backend
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
    # prometheus -> /metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
  egress:
    # backend -> postgresql
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - port: 5432
    # dns
    - ports:
        - port:     53
          protocol: UDP
        - port:     53
          protocol: TCP
---
# le frontend peut seulement parler au backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-egress-policy
  labels:
    {{- include "pixel-war.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pixel-war.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
      ports:
        - port: 3000
    - ports:
        - port:     53
          protocol: UDP
        - port:     53
          protocol: TCP
{{- end }}
