apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pixel-war.fullname" . }}-backend
  labels:
    {{- include "pixel-war.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "pixel-war.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge:       1
  template:
    metadata:
      labels:
        {{- include "pixel-war.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        # force le redeploiement si l'image change
        rollme: {{ .Values.backend.image.tag | quote }}
        # pour que prometheus detecte le pod
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        fsGroup:      1001
      # on attend que postgres soit pret avant de lancer le backend
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Attente de PostgreSQL..."
              until nc -z {{ .Values.backend.dbHost }} 5432; do
                echo "PostgreSQL non disponible, nouvelle tentative dans 2s..."
                sleep 2
              done
              echo "PostgreSQL disponible."
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: [ALL]
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name:          http
              containerPort: 3000
              protocol:      TCP
          # config depuis le configmap
          envFrom:
            - configMapRef:
                name: {{ .Values.backend.configMapName }}
          # secrets pour la base de donnees
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key:  POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key:  POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key:  POSTGRES_DB
          # securite
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: [ALL]
          # readiness probe
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds:       10
            failureThreshold:    3
          # liveness probe
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds:       20
            failureThreshold:    3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          # volume temporaire car le filesystem est en lecture seule
          volumeMounts:
            - name:      tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
