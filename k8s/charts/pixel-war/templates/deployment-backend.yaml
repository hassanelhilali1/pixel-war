apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pixel-war.fullname" . }}-backend
  labels:
    {{- include "pixel-war.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "pixel-war.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge:       1
  template:
    metadata:
      labels:
        {{- include "pixel-war.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        # Force le redéploiement lors d'un changement d'image
        rollme: {{ .Values.backend.image.tag | quote }}
        # Prometheus auto-discovery
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        fsGroup:      1001
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name:          http
              containerPort: 3000
              protocol:      TCP
          # Variables non-sensibles depuis ConfigMap (créé par Terraform)
          envFrom:
            - configMapRef:
                name: {{ .Values.backend.configMapName }}
          # Variables sensibles depuis Secret (créé par Terraform)
          # On n'utilise PAS DATABASE_URL car le mot de passe contient '@'
          # ce qui casse le parsing des URL PostgreSQL.
          # On injecte les variables individuelles : le backend bascule
          # automatiquement sur le chemin DB_HOST/POSTGRES_* de pool.js.
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key:  POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key:  POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key:  POSTGRES_DB
          # Sécurité du conteneur
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: [ALL]
          # Readiness probe : le pod est retiré du LB s'il ne répond pas
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds:       10
            failureThreshold:    3
          # Liveness probe : redémarre le pod si bloqué
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds:       20
            failureThreshold:    3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          # tmpfs pour les fichiers temporaires (readOnlyRootFilesystem)
          volumeMounts:
            - name:      tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
