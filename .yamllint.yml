---
extends: default

# Les templates Helm contiennent de la syntaxe Go ({{ }}) incompatible
# avec le parseur YAML strict — on les exclut du lint.
ignore: |
  k8s/charts/pixel-war/templates/

rules:
  # Autorise les espaces multiples après ':' (alignement vertical des valeurs)
  colons:
    max-spaces-after: -1

  # Autorise les espaces dans les accolades (restes de templates Helm éventuels)
  braces:
    min-spaces-inside: 0
    max-spaces-inside: -1

  # Autorise les espaces après les virgules (listes Helm)
  commas:
    max-spaces-after: -1

  line-length:
    max: 200

  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false

  document-start: disable

  comments-indentation: disable

  empty-lines:
    max: 2
