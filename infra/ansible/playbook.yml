---
# =============================================================================
# Pixel War 2026 — Playbook de configuration de la machine hôte
# =============================================================================
# Configure l'environnement de développement/déploiement complet :
#   - Docker Engine
#   - kubectl, Helm
#   - Minikube (démarrage + addons)
#   - Terraform
#
# Usage :
#   ansible-playbook -i inventory/localhost.yml playbook.yml
#   ansible-playbook -i inventory/localhost.yml playbook.yml --tags docker
# =============================================================================

- name: "  Configurer la machine hôte Pixel War"
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Versions des outils (modifiables en ligne de commande avec -e)
    kubectl_version:   "1.28.3"
    helm_version:      "3.13.3"
    terraform_version: "1.6.6"
    minikube_version:  "1.32.0"

    # Configuration Minikube
    minikube_driver: docker
    minikube_cpus:   4
    minikube_memory: "6g"

    # Utilisateur qui exécutera minikube (non-root)
    deploy_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

  roles:
    - role: common
      tags: [common, base]

    - role: docker
      tags: [docker]

    - role: kubernetes_tools
      tags: [kubernetes, kubectl, helm]

    - role: minikube
      tags: [minikube, kubernetes]

    - role: terraform_tool
      tags: [terraform, iac]

  post_tasks:
    - name: " Afficher le résumé de configuration"
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════
           Configuration terminée !
          ════════════════════════════════════════

          Outils installés :
            Docker   : {{ docker_version.stdout | default('vérifier manuellement') }}
            kubectl  : {{ kubectl_version }}
            Helm     : {{ helm_version }}
            Minikube : {{ minikube_version }}
            Terraform: {{ terraform_version }}

          Prochaines étapes :
            1. cd infra/terraform
               terraform init && terraform apply

            2. helm upgrade --install pixel-war k8s/charts/pixel-war/ \
                 --namespace pixel-war \
                 --values k8s/charts/pixel-war/values.yaml

            3. minikube tunnel  (terminal séparé)
               → http://pixel-war.local
          ════════════════════════════════════════
      tags: always
